<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeNova | Admin Verification</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary-start: #a855f7;
      --color-primary-end: #ec4899;
      --color-bg-dark: #09090e;
      --color-bg-card: rgba(30, 30, 45, 0.45);
      --border-glow: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --color-purple: #a855f7;
      --color-red: #ef4444;
      --grad-btn: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #09090e 0%, #11111d 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Outer glow ring */
    .login-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--color-bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0px rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 2;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .logo-text .highlight {
      background: var(--grad-btn);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title-row {
      margin-bottom: 24px;
    }

    .title-row h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: white;
    }

    .title-row p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .form-group {
      width: 100%;
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 16px;
      color: white;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.25s;
    }

    .input-wrapper input:focus {
      border-color: var(--color-purple);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
    }

    .error-msg {
      color: var(--color-red);
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      background: var(--grad-btn);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
      transition: all 0.25s;
    }

    .submit-btn:hover {
      box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
      transform: translateY(-1px);
    }

    .back-link {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: white;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="adminLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
          </defs>
          <rect x="23" y="23" width="54" height="54" rx="14" transform="rotate(45 50 50)" stroke="url(#adminLogoGrad)" stroke-width="5" />
          <path d="M 44 42 L 36 50 L 44 58" stroke="#f472b6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M 56 42 L 64 50 L 56 58" stroke="#f472b6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="logo-text">Code<span class="highlight">Nova</span> Admin</span>
      </div>

      <div class="title-row">
        <h2>Gatekeeper Verification</h2>
        <p>Please enter the administrative credentials to enter the dashboard.</p>
      </div>

      <form id="adminLoginForm" style="width: 100%;">
        <div class="form-group">
          <label for="adminPassword">Admin Password</label>
          <div class="input-wrapper">
            <input type="password" id="adminPassword" placeholder="••••••••" required>
          </div>
          <div class="error-msg" id="loginError">Incorrect verification password.</div>
        </div>

        <button type="submit" class="submit-btn">Verify and Enter</button>
      </form>


    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('adminLoginForm');
      const passwordInput = document.getElementById('adminPassword');
      const errorMsg = document.getElementById('loginError');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';

        const password = passwordInput.value;

        fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        })
        .then(res => {
          if (!res.ok) {
            throw new Error('Incorrect credentials');
          }
          return res.json();
        })
        .then(data => {
          if (data.success && data.token) {
            // Save admin token in sessionStorage
            sessionStorage.setItem('cn_admin_token', data.token);
            window.location.href = 'admin.html';
          }
        })
        .catch(err => {
          errorMsg.style.display = 'block';
          passwordInput.value = '';
          passwordInput.focus();
        });
      });
    });
  </script>
</body>
</html>

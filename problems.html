          <span>Home</span>
        </a>
        <a href="problems.html" class="sidebar-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 17V7h6v10"/></svg>
          <span>Problems</span>
        </a>

        <a href="discuss.html" class="sidebar-item">

        <a href="bookmarks.html" class="sidebar-item">

        </a>

    <!-- MIDDLE COLUMN: ALL PROBLEMS -->
    <main class="main-content">
      <!-- Search & Filters Card -->
      <section class="card filters-card">
        <div class="problems-filters-row">
          <!-- Search input box -->
          <div class="probs-search-box">
            <span class="search-svg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" id="problemsSearchInput" placeholder="Search by problem name or category..." autocomplete="off">
          </div>
          <!-- Difficulty dropdown -->
          <select id="problemsDifficultySelect" class="difficulty-select" aria-label="Difficulty Filter">
            <option value="all">All Difficulties</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>

        <!-- Chips selection bar -->
        <div class="chips-container-row">
          <button class="chip active" data-category="all">All</button>
          <button class="chip" data-category="arrays">Arrays</button>
          <button class="chip" data-category="strings">Strings</button>
          <button class="chip" data-category="math">Math</button>
          <button class="chip" data-category="loops">Loops</button>
          <button class="chip" data-category="recursion">Recursion</button>
          <button class="chip" data-category="searching">Searching</button>
        </div>
      </section>

      <!-- Main Problems table card -->
      <section class="card table-card">
        <div class="table-wrapper">
          <table class="challenges-table">
            <thead>
              <tr>
                <th class="col-num">#</th>
                <th class="col-name">Problem</th>
                <th class="col-diff">Difficulty</th>
                <th class="col-accept">Acceptance</th>
                <th class="col-action">Bookmarks</th>
              </tr>
            </thead>
            <tbody id="problemsTableBody">
              <!-- Rendered via JS -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- RIGHT COLUMN -->
    <aside class="sidebar-right">
      <div class="card streak-sidebar-card">
        <h3>Difficulty Ratio</h3>
        <div style="font-size: 13.5px; color: var(--text-muted); line-height: 1.5; display:flex; flex-direction:column; gap:10px; margin-top: 10px;">
          <div><span style="color:var(--color-green); font-weight:600;">Easy</span>: 5 Problems</div>
          <div><span style="color:var(--color-purple); font-weight:600;">Medium</span>: 3 Problems</div>
          <div><span style="color:var(--color-pink); font-weight:600;">Hard</span>: 2 Problems</div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    let problemsList = [];

    document.addEventListener('DOMContentLoaded', () => {
      const tableBody = document.getElementById('problemsTableBody');
      const searchInput = document.getElementById('problemsSearchInput');
      const diffSelect = document.getElementById('problemsDifficultySelect');
      const chips = document.querySelectorAll('.chip');
      
      let activeCategory = 'all';

      // Parse URL parameters for filters
      const urlParams = new URLSearchParams(window.location.search);
      const categoryParam = urlParams.get('category');
      const searchParam = urlParams.get('search');
      const diffParam = urlParams.get('difficulty');

      if (categoryParam) {
        activeCategory = categoryParam.toLowerCase();
        chips.forEach(c => {
          if (c.getAttribute('data-category') === activeCategory) {
            c.classList.add('active');
          } else {
            c.classList.remove('active');
          }
        });
      }
      if (searchParam) {
        searchInput.value = searchParam;
      }
      if (diffParam) {
        diffSelect.value = diffParam.toLowerCase();
      }

      // Fetch problems from server
      fetch(API_BASE_URL + '/api/problems')
        .then(res => res.json())
        .then(data => {
          problemsList = data;
          problemsList.sort((a, b) => Number(a.id) - Number(b.id));
          renderTable();
        })
        .catch(err => {
          console.warn('Failed to load problems, falling back to local database:', err);
          problemsList = FALLBACK_PROBLEMS;
          problemsList.sort((a, b) => Number(a.id) - Number(b.id));
          renderTable();
        });

      // Render table
      function renderTable() {
        if (!tableBody) return;
        const query = searchInput.value.toLowerCase().trim();
        const selectedDiff = diffSelect.value;
        const bookmarkedList = getBookmarks();
        const solvedList = getSolved();

        tableBody.innerHTML = '';

        problemsList.forEach((prob, index) => {
          // Filter matching
          const matchesSearch = prob.title.toLowerCase().includes(query) || prob.category.toLowerCase().includes(query);
          const matchesDiff = (selectedDiff === 'all' || prob.difficulty === selectedDiff);
          const matchesCategory = (activeCategory === 'all' || prob.category === activeCategory);

          if (matchesSearch && matchesDiff && matchesCategory) {
            const isBookmarked = bookmarkedList.includes(prob.id);
            const isSolved = solvedList.includes(prob.id);
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
              <td>${index + 1}</td>
              <td class="problem-name">
                <a href="editor.html?id=${prob.id}" style="display:inline-flex; align-items:center; gap:8px;">
                  ${isSolved ? `
                    <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3" style="width:14px; height:14px;">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  ` : ''}
                  ${prob.title}
                </a>
              </td>
              <td><span class="badge diff-${prob.difficulty}">${prob.difficulty.toUpperCase()}</span></td>
              <td>${prob.acceptance}</td>
              <td>
                <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" data-id="${prob.id}">
                  <svg viewBox="0 0 24 24" fill="${isBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                    <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
                  </svg>
                </button>
              </td>
            `;
            
            // Add click listener for bookmark button in row
            const btn = tr.querySelector('.bookmark-btn');
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const isNow = toggleBookmark(prob.id);
              btn.classList.toggle('active', isNow);
              btn.querySelector('svg').setAttribute('fill', isNow ? 'currentColor' : 'none');
            });

            tableBody.appendChild(tr);
          }
        });

        // Update sidebar difficulty counts dynamically
        const easyCount = problemsList.filter(p => p.difficulty.toLowerCase() === 'easy').length;
        const mediumCount = problemsList.filter(p => p.difficulty.toLowerCase() === 'medium').length;
        const hardCount = problemsList.filter(p => p.difficulty.toLowerCase() === 'hard').length;
        const sidebarRows = document.querySelectorAll('.streak-sidebar-card div > div');
        if (sidebarRows.length >= 3) {
          sidebarRows[0].innerHTML = `<span style="color:var(--color-green); font-weight:600;">Easy</span>: ${easyCount} Problems`;
          sidebarRows[1].innerHTML = `<span style="color:var(--color-purple); font-weight:600;">Medium</span>: ${mediumCount} Problems`;
          sidebarRows[2].innerHTML = `<span style="color:var(--color-pink); font-weight:600;">Hard</span>: ${hardCount} Problems`;
        }
      }

      // Filter events
      searchInput.addEventListener('input', renderTable);
      diffSelect.addEventListener('change', renderTable);
      
      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          chips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeCategory = chip.getAttribute('data-category');
          renderTable();
        });
      });
    });
  </script>
</body>
